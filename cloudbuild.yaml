# Cloud Build pipeline: build the container image, push it to Artifact
# Registry, and deploy to Cloud Run.
#
# One-time setup (run once per project):
#   gcloud services enable \
#     run.googleapis.com cloudbuild.googleapis.com artifactregistry.googleapis.com
#   gcloud artifacts repositories create web \
#     --repository-format=docker --location=us-central1
#   # Grant the Cloud Build service account permission to deploy to Cloud Run:
#   PROJECT_NUMBER=$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')
#   gcloud projects add-iam-policy-binding "$PROJECT_ID" \
#     --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#     --role=roles/run.admin
#   gcloud projects add-iam-policy-binding "$PROJECT_ID" \
#     --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#     --role=roles/iam.serviceAccountUser
#
# Deploy:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_SERVICE=humanfirst-web,_REPO=web,_TAG=latest
#
# Server-side secrets (email) are NOT baked into the image. Set them on the
# Cloud Run service after the first deploy, e.g.:
#   gcloud run services update humanfirst-web --region us-central1 \
#     --update-env-vars EMAIL_HOST=smtp.gmail.com,EMAIL_PORT=587,EMAIL_SECURE=false \
#     --update-env-vars EMAIL_USER=you@gmail.com,EMAIL_PASSWORD=app-password

substitutions:
  _REGION: us-central1
  _SERVICE: humanfirst-web
  _REPO: web
  _TAG: latest
  # NEXT_PUBLIC_* values are inlined at BUILD time. Set this if the Calendly
  # widget should render in the deployed build.
  _NEXT_PUBLIC_CALENDLY_URL: ""

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_TAG}"

steps:
  # 1. Build the image (NEXT_PUBLIC_* passed as a build arg).
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_TAG}"
      - "--build-arg"
      - "NEXT_PUBLIC_CALENDLY_URL=${_NEXT_PUBLIC_CALENDLY_URL}"
      - "."

  # 2. Push the image to Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_TAG}"

  # 3. Deploy to Cloud Run.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
